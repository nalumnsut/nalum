version: '3.8'

services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: alumni-frontend

    restart: unless-stopped

    expose:
      - "80"

    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: alumni-backend

    restart: unless-stopped

    env_file:
      - ./backend/.env

    expose:
      - "2478"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine

    container_name: alumni-redis

    restart: unless-stopped

    expose:
      - "6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data: