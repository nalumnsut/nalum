version: '3.8'

services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: alumni-frontend

    restart: unless-stopped

    ports:
      - "127.0.0.1:3000:80"

    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: alumni-backend

    restart: unless-stopped

    env_file:
      - ./backend/.env

    ports:
      - "127.0.0.1:2478:2478"
    extra_hosts:
      - "host.docker.internal:host-gateway"

    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:2478/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
    
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_started

  mongo:
    image: mongo:7
    container_name: alumni-mongo
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine

    container_name: alumni-redis

    restart: unless-stopped

    expose:
      - "6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
  mongo_data:
